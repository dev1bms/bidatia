{% load i18n l10n %}{% localize off %}{# SVG coordinates must NEVER be locale-formatted: an Arabic/Spanish decimal separator inside cx/cy/d breaks the whole drawing #}<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 {{ map.view_w }} {{ map.view_h }}" role="img" aria-label="{% trans 'System map of Odoo customizations: each circle is a model, warm colors mark custom structures, threads are automations.' %}" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
    <rect x="0" y="0" width="{{ map.view_w }}" height="{{ map.view_h }}" fill="#ffffff"/>

    {# Faint orbit rings, each captioned with its meaning on the left #}
    {% for ring in map.rings %}
    <circle cx="{{ map.cx }}" cy="{{ map.cy }}" r="{{ ring.r }}" fill="none" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3 5"/>
    {# no letter-spacing: it would cut Arabic cursive joining (same rule as the site CSS) #}
    <text x="{{ ring.label_x }}" y="{{ ring.label_y }}" text-anchor="middle" font-size="9.5" font-weight="700" fill="#94a3b8" stroke="#ffffff" stroke-width="3" paint-order="stroke" stroke-linejoin="round">{{ ring.label|upper }}</text>
    {% endfor %}

    {# Structural spokes (one per model) #}
    {% for spoke in map.spokes %}
    <line x1="{{ map.cx }}" y1="{{ map.cy }}" x2="{{ spoke.x2 }}" y2="{{ spoke.y2 }}" stroke="{{ map.spoke_color }}" stroke-width="1" opacity="0.3"/>
    {% endfor %}

    {# Automation threads — one per automation, fanned into a tidy bundle #}
    {% for thread in map.threads %}
    <path d="{{ thread.d }}" fill="none" stroke="{{ map.thread_color }}" stroke-width="{{ thread.width }}" opacity="0.4" stroke-linecap="round"/>
    {% endfor %}

    {# Model nodes: halo = custom-field density, fill = risk class #}
    {% for node in map.nodes %}
    {% if node.halo_r %}<circle cx="{{ node.x }}" cy="{{ node.y }}" r="{{ node.halo_r }}" fill="none" stroke="{{ node.fill }}" stroke-width="3" opacity="0.28"/>{% endif %}
    <circle cx="{{ node.x }}" cy="{{ node.y }}" r="{{ node.r }}" fill="{{ node.fill }}" opacity="{{ node.opacity }}"/>
    <text x="{{ node.x }}" y="{{ node.label_y }}" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1e293b" stroke="#ffffff" stroke-width="3.5" paint-order="stroke" stroke-linejoin="round">{{ node.label }}</text>
    {% if node.sub %}<text x="{{ node.x }}" y="{{ node.sub_y }}" text-anchor="middle" font-size="9.5" font-weight="500" fill="#64748b" stroke="#ffffff" stroke-width="3" paint-order="stroke" stroke-linejoin="round">{{ node.sub }}</text>{% endif %}
    {% endfor %}

    {# Odoo core #}
    <circle cx="{{ map.cx }}" cy="{{ map.cy }}" r="{{ map.center_halo_r }}" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.25"/>
    <circle cx="{{ map.cx }}" cy="{{ map.cy }}" r="{{ map.center_r }}" fill="#0f172a"/>
    <text x="{{ map.cx }}" y="{{ map.cy }}" dy="4.5" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">{{ map.center_label }}</text>

    <text x="{{ map.view_w|add:'-14' }}" y="{{ map.view_h|add:'-12' }}" text-anchor="end" font-size="9" fill="#cbd5e1">Bidatia Studio X-Ray — bidatia.xyz</text>
</svg>{% endlocalize %}
