{% comment %}
Renders a refined line icon for a service based on its `icon` keyword.
Usage: {% include "partials/service_icon.html" with icon=service.icon %}
Optional: class="..." to override sizing/color (defaults to h-6 w-6).
{% endcomment %}
<svg class="{{ class|default:'h-6 w-6' }}" aria-hidden="true" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
{% if icon == "consultation" %}
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" /><path d="M8 9h8M8 13h5" />
{% elif icon == "audit" %}
    <circle cx="11" cy="11" r="7" /><path d="M21 21l-4.3-4.3" /><path d="M8.5 11l1.8 1.8 3.2-3.6" />
{% elif icon == "cleanup" %}
    <path d="M13 3l1.9 5.1L20 10l-5.1 1.9L13 17l-1.9-5.1L6 10l5.1-1.9z" /><path d="M5 16v4M3 18h4" />
{% elif icon == "migration" %}
    <path d="M3 17l6-6 4 4 8-8" /><path d="M21 7v6M21 7h-6" />
{% elif icon == "module" %}
    <rect x="3.5" y="3.5" width="7" height="7" rx="1.2" /><rect x="13.5" y="3.5" width="7" height="7" rx="1.2" /><rect x="3.5" y="13.5" width="7" height="7" rx="1.2" /><rect x="13.5" y="13.5" width="7" height="7" rx="1.2" />
{% elif icon == "integration" %}
    <path d="M13.8 10.2a4 4 0 0 0-5.6 0l-4 4a4 4 0 1 0 5.6 5.6l1.1-1.1" /><path d="M10.2 13.8a4 4 0 0 0 5.6 0l4-4a4 4 0 1 0-5.6-5.6l-1.1 1.1" />
{% elif icon == "support" %}
    <circle cx="12" cy="12" r="9" /><circle cx="12" cy="12" r="4" /><path d="M18.4 5.6l-3.6 3.6M9.2 14.8l-3.6 3.6M18.4 18.4l-3.6-3.6M9.2 9.2L5.6 5.6" />
{% elif icon == "crm" %}
    <path d="M3 17l5-5 4 3 6-7" /><path d="M14 8h4v4" /><path d="M3 21h18" />
{% elif icon == "accounting" %}
    <rect x="5" y="3" width="14" height="18" rx="1.5" /><path d="M8 7h8M8 11h8" /><path d="M8 15h3" /><circle cx="15.5" cy="15.5" r="1.6" />
{% elif icon == "automation" %}
    <circle cx="12" cy="12" r="3" /><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1" />
{% elif icon == "bi" %}
    <path d="M3 3v18h18" /><rect x="7" y="12" width="3" height="6" rx="0.6" /><rect x="12" y="8" width="3" height="10" rx="0.6" /><rect x="17" y="5" width="3" height="13" rx="0.6" />
{% elif icon == "ai" %}
    <path d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6z" /><path d="M18 14l.8 2.2L21 17l-2.2.8L18 20l-.8-2.2L15 17l2.2-.8z" />
{% elif icon == "governance" %}
    <path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z" /><path d="M9 11.5l2 2 4-4.2" />
{% elif icon == "data" %}
    <ellipse cx="12" cy="6" rx="7" ry="3" /><path d="M5 6v6c0 1.7 3.1 3 7 3s7-1.3 7-3V6" /><path d="M5 12v6c0 1.7 3.1 3 7 3s7-1.3 7-3v-6" />
{% else %}
    <path d="M13 10V3L4 14h7v7l9-11h-7z" />
{% endif %}
</svg>
