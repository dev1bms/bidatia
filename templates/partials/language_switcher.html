{% load i18n i18n_urls %}
{% get_current_language as CURRENT_LANG %}
<div x-data="{ lang: false }" class="relative">
    <button @click="lang = !lang" :aria-expanded="lang" aria-label="{% trans 'Change language' %}"
            class="inline-flex items-center gap-1.5 rounded-lg border border-slate-200 px-2.5 py-2 text-xs font-semibold text-slate-600 hover:border-ink hover:text-ink transition">
        {% include "partials/lang_flag.html" with code=CURRENT_LANG %}
        <span class="uppercase force-ltr">{{ CURRENT_LANG }}</span>
        <svg class="h-3.5 w-3.5" aria-hidden="true" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
    </button>
    <div x-show="lang" x-cloak @click.outside="lang = false" x-transition
         class="absolute end-0 mt-2 w-44 rounded-lg border border-slate-200 bg-white shadow-lg py-1 z-50">
        <a href="{% language_url 'en' %}" class="flex items-center gap-2.5 w-full text-start px-4 py-2 text-sm hover:bg-slate-50 {% if CURRENT_LANG == 'en' %}font-bold text-ink{% else %}text-slate-600{% endif %}">{% include "partials/lang_flag.html" with code='en' %}<span>English</span></a>
        <a href="{% language_url 'es' %}" class="flex items-center gap-2.5 w-full text-start px-4 py-2 text-sm hover:bg-slate-50 {% if CURRENT_LANG == 'es' %}font-bold text-ink{% else %}text-slate-600{% endif %}">{% include "partials/lang_flag.html" with code='es' %}<span>Español</span></a>
        <a href="{% language_url 'ar' %}" class="flex items-center gap-2.5 w-full text-start px-4 py-2 text-sm hover:bg-slate-50 {% if CURRENT_LANG == 'ar' %}font-bold text-ink{% else %}text-slate-600{% endif %}">{% include "partials/lang_flag.html" with code='ar' %}<span>العربية</span></a>
    </div>
</div>
